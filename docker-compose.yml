services:
  db:
    image: postgres:16-alpine
    container_name: ev-scheduler-db
    environment:
      POSTGRES_USER: ev_user
      POSTGRES_PASSWORD: ev_pass
      POSTGRES_DB: ev_scheduler
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ev-scheduler-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./ev_scheduler.db
      RL_BACKEND: auto
      USE_GPU: "true"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
